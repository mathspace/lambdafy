name: Lambdafy
author: Mathspace Pty. Ltd.
description: Makes it easy to deploy docker based websites on AWS lambda
inputs:
  image:
    description: Docker image to deploy
    required: true
  spec:
    description: Spec file path
    required: false
  version:
    description: Lambdafy version to use
    required: false 
    default: "0.0.2"
runs:
  using: "docker"
  image: "Dockerfile"
  env:
    LAMBDAFY_SPEC: ${{ inputs.spec }}
    LAMBDAFY_VERSION: ${{ inputs.version }}
  args:
    - deploy
    - ${{ inputs.image }}
